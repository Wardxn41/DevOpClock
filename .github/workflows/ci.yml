name: DevOP Clock
# When should this run?
on:
  push:
      branches:
        - main
        - feature/**

#  End of section now know when we should call integration


# Jobs
jobs:
  build-and-test:


    steps:
      # take a look at da repo
      - name: Checkout repository
      - uses: actions/checkout/@v4
      # set up our version of python
      - name: Set up python
      - uses: actions/setup-python@v5
      - with:
          python-version:"3.14"
      # install the dependencies
      - name: Install dependencies
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      # set up tests
      - name: Install testing framework
      - run: |
          pip install pytest

      # run tests
      - name: Run tests
      - run: |
          pytest

      # Verify flask starts
      - name: Verify flask starts
      - run: |
          python app.py & 
          sleep 5
          curl http://127.0.0.1.5000

      # Docker!
      - name: Start docker
      - run: |
          docker build -t devop_clock .

      # Success!
      - name: Completed
      - run: echo "Completed"



